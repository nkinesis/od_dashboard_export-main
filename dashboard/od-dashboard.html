<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PopGen · Actual OD survey (PM23)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/loading-overlay.css" />
  <link rel="stylesheet" href="assets/dashboard-nav.css?v=14" />
  <link rel="stylesheet" href="assets/dashboard-shell.css?v=11" />
  <link rel="stylesheet" href="assets/dashboard-spa.css?v=8" />
  <script src="assets/dashboard-zone-ui.js?v=16"></script>
  <script src="assets/loading-overlay.js?v=11"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>
  <style>
    :root {
      --bg0: #070a0f; --bg1: #0c1119; --surface: #121a26; --border: rgba(94, 129, 172, 0.22);
      --text: #e8eef7; --muted: #8b9cb8; --accent: #5eead4; --green: #4ade80;
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.45); --radius: 14px;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: "DM Sans", system-ui, sans-serif;
      background: radial-gradient(1200px 800px at 10% -10%, rgba(56, 189, 248, 0.08), transparent),
        radial-gradient(900px 600px at 90% 0%, rgba(167, 139, 250, 0.06), transparent), var(--bg0);
      color: var(--text); min-height: 100vh;
    }
    .app {
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: 100vh;
    }
    header.shell {
      grid-column: 1 / -1;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(18, 26, 38, 0.95), rgba(12, 17, 25, 0.6));
      backdrop-filter: blur(12px);
    }
    header.shell h1 {
      margin: 0; font-family: Outfit, sans-serif; font-weight: 700; font-size: 1.35rem;
      background: linear-gradient(135deg, var(--text), var(--accent));
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    header.shell .tagline { color: var(--muted); font-size: 0.88rem; }
    .sidebar {
      border-right: 1px solid var(--border); padding: 1rem 1.25rem 1.5rem;
      overflow-y: auto; overflow-x: hidden; max-height: calc(100vh - 64px);
      position: relative; z-index: 10;
    }
    @media (max-width: 1100px) {
      .sidebar { max-height: none; border-right: 0; border-bottom: 1px solid var(--border); }
    }
    .main { display: flex; flex-direction: column; min-height: 0; }
    .kpis { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.65rem; margin-bottom: 1rem; }
    .kpi {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 0.75rem 1rem;
    }
    .kpi .label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 0.2rem; }
    .kpi .value { font-family: Outfit, sans-serif; font-size: 1.35rem; font-weight: 600; color: var(--accent); }
    .kpi .value.green { color: var(--green); }
    .charts-row-2 { display: grid; grid-template-columns: 1fr; gap: 0.75rem; margin-bottom: 0.75rem; }
    .charts-stack { display: flex; flex-direction: column; gap: 0.75rem; }
    .card {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 0.75rem 0.85rem; height: 220px; box-shadow: var(--shadow);
      min-width: 0; overflow: hidden;
    }
    .card h3 { margin: 0 0 0.5rem; font-size: 0.78rem; font-weight: 600; color: var(--muted); font-family: Outfit, sans-serif; }
    .card canvas { max-height: 170px; width: 100% !important; }
    .kpi .sub {
      font-size: 0.68rem; color: var(--muted); margin-top: 0.25rem; line-height: 1.35;
      font-variant-numeric: tabular-nums;
    }
    .pill {
      border: 1px solid var(--border); border-radius: 999px; padding: 0.2rem 0.55rem;
      font-variant-numeric: tabular-nums; font-size: 0.78rem; color: var(--muted);
    }
  </style>
</head>
<body data-dash-page="host" class="dash-spa-host dash-spa-host-od">
  <div id="pageLoading" class="page-loading hidden" aria-live="polite">
    <div class="page-loading-backdrop" aria-hidden="true"></div>
    <div class="page-loading-content">
      <img id="loadingGif" class="page-loading-img active" src="assets/gif-loading1-static.jpg?v=9" alt="Loading">
    </div>
  </div>
  <div class="app">
    <header class="shell">
      <div>
        <h1>CMM · Island-eligible car trips</h1>
        <div class="tagline">PM23 survey · CMM residents · Montreal island emissions</div>
      </div>
      <nav class="dash-nav" aria-label="OD dashboard views">
        <a class="dash-nav-link active" data-page="od-zones" href="/?view=zones">Zone maps</a>
        <a class="dash-nav-link" data-page="od-buildings" href="/?view=buildings">Buildings</a>
        <a class="dash-nav-link" data-page="od-flows" href="/?view=flows">Flows</a>
        <a class="dash-nav-link" data-page="od-boundaries" href="/od-zones-boundary.html">Boundaries</a>
      </nav>
      <span class="pill" id="liveHint">Loading dashboard…</span>
    </header>

    <aside class="sidebar">
      <div class="kpis" id="kpis">
        <div class="kpi"><div class="label" id="kpi-trips-label">Car trips (expanded)</div><div class="value" id="kpi-trips">—</div><div class="sub" id="kpi-trips-sub"></div></div>
        <div class="kpi"><div class="label">CO₂ (kg)</div><div class="value" id="kpi-co2">—</div></div>
        <div class="kpi"><div class="label">Distance (km)</div><div class="value" id="kpi-km">—</div></div>
        <div class="kpi"><div class="label">Avg kg / trip</div><div class="value green" id="kpi-avg">—</div></div>
      </div>
      <div class="charts-row-2">
        <div class="card"><h3>Emissions by travel reason (kg CO₂)</h3><canvas id="chart-emissions"></canvas></div>
      </div>
      <div class="charts-stack">
        <div class="card"><h3>Emissions share · island</h3><canvas id="chart-donut"></canvas></div>
        <div class="card"><h3>Trips by travel reason</h3><canvas id="chart-trips"></canvas></div>
      </div>
    </aside>

    <section class="main dash-frames-wrap">
      <iframe class="dash-frame active" id="frame-od-zones" data-page="od-zones" title="Zone maps"></iframe>
      <iframe class="dash-frame" id="frame-od-buildings" data-page="od-buildings" title="Buildings map"></iframe>
      <iframe class="dash-frame" id="frame-od-flows" data-page="od-flows" title="Flows map"></iframe>
    </section>
  </div>

  <script src="assets/dashboard-spa-od.js?v=12"></script>
  <script src="assets/dashboard-nav.js?v=13"></script>
  <script src="assets/dashboard-host-od.js?v=13"></script>
</body>
</html>
